<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background-color: #fafff8;
  font-family: 'Zen Kaku Gothic New', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ===== ナビ ===== */
.top-nav {
  padding: 32px 48px;
  display: flex;
  gap: 16px;
  font-size: 28px;
  letter-spacing: 0.1em;
}

.top-nav span {
  cursor: pointer;
  color: #888;
}

.top-nav span.active {
  color: #000;
}

/* ===== メイン ===== */
main {
  padding: 32px 48px 64px;
  max-width: 900px;
}

.section {
  display: none;
}

.section.active {
  display: block;
}

/* ===== 作品 ===== */
.work {
  margin-bottom: 60px;
}

.visual {
  margin-bottom: 10px;
}

.visual img {
  max-width: 100%;
  display: block;
}

.work-info {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.title {
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
}

.title:hover {
  opacity: 0.6;
}

.meta {
  font-size: 12px;
  color: #555;
}

/* ===== Contact ===== */
.contact-info {
  font-size: 14px;
  line-height: 2;
  margin-top: 40px;
}

.contact-info a {
  color: #2a5bd7;
  text-decoration: underline;
}

/* ===== ホバー画像 ===== */
.hover-preview {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 380px;
  pointer-events: none;
  opacity: 0;
  z-index: 50;
}

.hover-preview img {
  width: 100%;
}

/* ===== モーダル ===== */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  z-index: 200;
}

.modal.active {
  opacity: 1;
  pointer-events: auto;
}

.modal-content {
  background: #fff;
  padding: 32px;
  max-width: 480px;
}

/* ===== ぼけ ===== */
.blur-layer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 150;
  overflow: hidden;
}

.blur-layer span {
  position: absolute;
  backdrop-filter: blur(10px);
  opacity: 0;
  mask-image: radial-gradient(circle, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 70%);
}

/* アニメ */
@keyframes floatBlur {
  0% { transform: translateX(-20vw); opacity: 0; }
  20% { opacity: 1; }
  80% { opacity: 1; }
  100% { transform: translateX(120vw); opacity: 0; }
}

.blur-layer span:nth-child(1) {
  width: 180px; height: 180px; top: 20%;
  animation: floatBlur 25s linear infinite;
}

.blur-layer span:nth-child(2) {
  width: 240px; height: 240px; top: 60%;
  animation: floatBlur 35s linear infinite;
  animation-delay: 5s;
}

.blur-layer span:nth-child(3) {
  width: 140px; height: 140px; top: 40%;
  animation: floatBlur 30s linear infinite;
  animation-delay: 10s;
}

/* ===== スマホ ===== */
@media (max-width: 768px) {

  .top-nav {
    padding: 16px;
    font-size: 20px;
    justify-content: space-between;
  }

  .top-nav span {
    flex: 1;
    text-align: center;
    padding: 8px 0;
  }

  main {
    padding: 24px 16px 48px;
  }

  .hover-preview {
    display: none;
  }

}
</style>
</head>

<body>

<div class="top-nav">

  <span data-section="art">A</span>
  <span data-section="goodnews">G</span>
  <span data-section="contact">C</span>
</div>

</main>

<div class="hover-preview"><img src=""></div>

<div class="modal">
  <div class="modal-content">
    <p class="modal-text"></p>
  </div>
</div>

<div class="blur-layer">
  <span></span><span></span><span></span>
</div>

<script>
const navItems = document.querySelectorAll('.top-nav span');
const sections = document.querySelectorAll('.section');
const preview = document.querySelector('.hover-preview');
const previewImg = preview.querySelector('img');
const modal = document.querySelector('.modal');
const modalText = document.querySelector('.modal-text');

const hoverImages = {
  design: 'images/Design_thumb_01.jpg',
  photograph: 'images/Photograph_thumb_01.jpg',
  art: 'images/Art_thumb_01.jpg'
};

// ナビ切替
navItems.forEach(item => {
  const key = item.dataset.section;

  item.addEventListener('click', () => {
    navItems.forEach(i => i.classList.remove('active'));
    sections.forEach(s => s.classList.remove('active'));

    item.classList.add('active');
    document.getElementById(key)?.classList.add('active');
  });
});

// ホバー（PCのみ）
if (window.innerWidth > 768) {
  navItems.forEach(item => {
    const key = item.dataset.section;

    if (hoverImages[key]) {
      item.addEventListener('mouseenter', () => {
        previewImg.src = hoverImages[key];
        preview.style.opacity = 1;
      });

      item.addEventListener('mouseleave', () => {
        preview.style.opacity = 0;
      });
    }
  });
}

// モーダル
document.querySelectorAll('.title').forEach(title => {
  title.addEventListener('click', () => {
    modalText.textContent = title.dataset.caption;
    modal.classList.add('active');
  });
});

modal.addEventListener('click', () => {
  modal.classList.remove('active');
});
</script>
