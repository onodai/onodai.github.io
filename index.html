<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #fafff8;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      padding: 32px;
    }

    .container {
      display: grid;
      grid-template-columns: 160px 1fr;
      background-color: #e8f5e2;
      max-width: 580px;
    }

    nav {
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    nav a {
      font-size: 14px;
      color: #666;
      text-decoration: none;
      letter-spacing: 0.02em;
      cursor: pointer;
    }

    nav a:hover {
      color: #333;
    }

    .info {
      padding: 28px 24px;
    }

    .info p {
      font-size: 13px;
      color: #666;
      line-height: 1.9;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="#">Design</a>
      <a href="#">Photograph</a>
      <a href="#">Art</a>
      <a href="#">GoodNews</a>
    </nav>
    <div class="info">
      <p>Graphic Designer, Photographer</p>
      <p>Mail: dai@onokobo.com　TEL: 080-6357-8554</p>
      <p>IG: @onoodai</p>
    </div>
  </div>
</body>
</html>
