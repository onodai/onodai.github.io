<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background-color: #fafff8;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
}

/* ===== ナビ（D P A G C） ===== */
.top-nav {
  padding: 32px 48px;
  display: flex;
  gap: 16px;
  font-size: 28px;
  letter-spacing: 0.1em;
}

.top-nav span {
  cursor: pointer;
  color: #888;
}

.top-nav span.active {
  color: #000;
}

/* ===== メイン ===== */
main {
  padding: 32px 48px 64px;
  max-width: 900px;
}

.section {
  display: none;
}

.section.active {
  display: block;
}

/* ===== 画像 ===== */
.visual {
  margin-bottom: 32px;
}

.visual img {
  width: auto;
  height: auto;
  max-width: 100%;
  display: block;
}

/* ===== 作品情報 ===== */
.work-info {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.artist a {
  font-size: 14px;
  color: #2a5bd7;
  text-decoration: underline;
}

.title {
  font-size: 18px;
  cursor: pointer;
}

.title:hover {
  opacity: 0.6;
}

.meta {
  font-size: 13px;
  color: #555;
  line-height: 1.8;
}

/* ===== ホバー画像 ===== */
.hover-preview {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 380px;
  pointer-events: none;
  opacity: 0;
  z-index: 50;
}

.hover-preview img {
  width: 100%;
}

/* ===== モーダル ===== */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  z-index: 200;
}

.modal.active {
  opacity: 1;
  pointer-events: auto;
}

.modal-content {
  background: #fff;
  padding: 32px;
  max-width: 480px;
  font-size: 14px;
  line-height: 1.8;
}

/* ===== ぼけ演出 ===== */
.blur-layer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 150;
  overflow: hidden;
}

.blur-layer span {
  position: absolute;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  opacity: 0;

/* ★ここがコア */
  mask-image: radial-gradient(circle, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 70%);
  -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 70%);
}
  
/* 雲アニメ */
@keyframes floatBlur {
  0% {
    transform: translateX(-20vw);
    opacity: 0;
  }
  20% {
    opacity: 1;
  }
  80% {
    opacity: 1;
  }
  100% {
    transform: translateX(120vw);
    opacity: 0;
  }
}

.blur-layer span:nth-child(1) {
  width: 180px;
  height: 180px;
  top: 20%;
  animation: floatBlur 25s linear infinite;
}

.blur-layer span:nth-child(2) {
  width: 240px;
  height: 240px;
  top: 60%;
  animation: floatBlur 35s linear infinite;
  animation-delay: 5s;
}

.blur-layer span:nth-child(3) {
  width: 140px;
  height: 140px;
  top: 40%;
  animation: floatBlur 30s linear infinite;
  animation-delay: 10s;
}

/* ===== スマホ ===== */
@media (max-width: 768px) {
  .top-nav {
    font-size: 22px;
  }
}
</style>
</head>

<body>

<!-- ナビ -->
<div class="top-nav">
  <span data-section="design" class="active">D</span>
  <span data-section="photograph">P</span>
  <span data-section="art">A</span>
  <span data-section="goodnews">G</span>
  <span data-section="contact">C</span>
</div>

<main>

<!-- Design -->
<section class="section active" id="design">
  <div class="visual">
    <img src="images/Design_01.jpg">
  </div>

  <div class="work-info">
    <p class="artist"><a href="#">your name</a></p>
    <p class="title" data-caption="作品説明">
      <em>work title, 2025</em>
    </p>
    <p class="meta">digital / print</p>
  </div>
</section>

<!-- Photograph -->
<section class="section" id="photograph">
  <div class="visual">
    <img src="images/Photograph_01.jpg">
  </div>

  <div class="work-info">
    <p class="artist"><a href="#">your name</a></p>
    <p class="title" data-caption="写真説明">
      <em>photo title, 2025</em>
    </p>
    <p class="meta">camera / location</p>
  </div>
</section>

<!-- Art -->
<section class="section" id="art">
  <div class="visual">
    <img src="images/Art_01.jpg">
  </div>

  <div class="work-info">
    <p class="artist"><a href="#">your name</a></p>
    <p class="title" data-caption="アート説明">
      <em>art title, 2025</em>
    </p>
    <p class="meta">oil on canvas</p>
  </div>
</section>

</main>

<!-- ホバー画像 -->
<div class="hover-preview">
  <img src="">
</div>

<!-- モーダル -->
<div class="modal">
  <div class="modal-content">
    <p class="modal-text"></p>
  </div>
</div>

<!-- ぼけ -->
<div class="blur-layer">
  <span></span>
  <span></span>
  <span></span>
</div>

<script>
const navItems = document.querySelectorAll('.top-nav span');
const sections = document.querySelectorAll('.section');
const preview = document.querySelector('.hover-preview');
const previewImg = preview.querySelector('img');

const modal = document.querySelector('.modal');
const modalText = document.querySelector('.modal-text');

const hoverImages = {
  design: 'images/Design_thumb_01.jpg',
  photograph: 'images/Photograph_thumb_01.jpg',
  art: 'images/Art_thumb_01.jpg'
};

// ナビ
navItems.forEach(item => {
  const key = item.dataset.section;

  item.addEventListener('click', () => {
    navItems.forEach(i => i.classList.remove('active'));
    sections.forEach(s => s.classList.remove('active'));

    item.classList.add('active');
    const target = document.getElementById(key);
    if (target) target.classList.add('active');
  });

  // ホバー画像
  if (hoverImages[key]) {
    item.addEventListener('mouseenter', () => {
      previewImg.src = hoverImages[key];
      preview.style.opacity = 1;
    });

    item.addEventListener('mouseleave', () => {
      preview.style.opacity = 0;
    });
  }
});

// モーダル
document.querySelectorAll('.title').forEach(title => {
  title.addEventListener('click', () => {
    modalText.textContent = title.dataset.caption;
    modal.classList.add('active');
  });
});

modal.addEventListener('click', () => {
  modal.classList.remove('active');
});
</script>

</body>
</html>
